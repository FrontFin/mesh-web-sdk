name: B2B Web SDK - Test & Deploy Node-API
on: workflow_dispatch
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5.1.0
      - name: Setup Node.js environment
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 20.x
      - name: Install dependencies
        run: yarn
      - name: Checking for type errors
        run: yarn typecheck
      - name: Checking for linting errors
        run: yarn lint
      - name: Yarn test
        run: yarn test
  deploy:
    runs-on: ubuntu-latest
    needs:
      - build-and-test
    permissions:
      id-token: write # required for npm OIDC trusted publishing
      contents: read
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5.1.0
      # Setup .npmrc file to publish to npm
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
      # OIDC trusted publishing requires npm >= 11.5.1; pin for reproducible releases
      - run: npm install -g npm@11.5.1
      - run: yarn
      - run: cd packages/node-api && yarn publish:npm
